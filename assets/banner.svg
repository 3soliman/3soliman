<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title">
  <title id="title">Soliman Alsabahi — Full Stack Developer</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#070B14"/>
      <stop offset="0.5" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#070B14"/>
    </linearGradient>
    <radialGradient id="orb1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(200 60) scale(200)">
      <stop stop-color="#6366F1" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1000 240) scale(240)">
      <stop stop-color="#06B6D4" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#6366F1"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </linearGradient>
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1" fill="#FFFFFF" fill-opacity="0.05"/>
    </pattern>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>
  <rect width="1200" height="300" fill="url(#dots)"/>
  <rect width="1200" height="300" fill="url(#orb1)"/>
  <rect width="1200" height="300" fill="url(#orb2)"/>
  <path d="M900 -20H960L780 320H720L900 -20Z" fill="#6366F1" fill-opacity="0.15"/>
  <path d="M980 -20H1010L830 320H800L980 -20Z" fill="#06B6D4" fill-opacity="0.12"/>

  <!-- Left panel -->
  <rect x="40" y="36" width="680" height="228" rx="16" fill="#0B1120" fill-opacity="0.9" stroke="url(#accent)" stroke-width="1.5"/>
  <rect x="40" y="36" width="680" height="5" rx="2" fill="url(#accent)"/>

  <text x="64" y="72" fill="#06B6D4" font-family="Consolas, monospace" font-size="13">// Full Stack Developer</text>
  <text x="64" y="112" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="40" font-weight="700">Soliman Alsabahi</text>
  <line x1="64" y1="128" x2="696" y2="128" stroke="#334155" stroke-width="1"/>
  <text x="64" y="156" fill="#CBD5E1" font-family="Consolas, monospace" font-size="13">const stack = ["Angular","Flutter","ASP.NET","Odoo","AI"];</text>
  <text x="64" y="180" fill="#64748B" font-family="Consolas, monospace" font-size="13">return buildFromIdeaToProduction(stack);</text>

  <rect x="64" y="200" width="90" height="28" rx="6" fill="#6366F1"/>
  <text x="109" y="219" text-anchor="middle" fill="#FFFFFF" font-family="Consolas, monospace" font-size="10" font-weight="700">ANGULAR</text>
  <rect x="164" y="200" width="86" height="28" rx="6" fill="none" stroke="#6366F1" stroke-opacity="0.7"/>
  <text x="207" y="219" text-anchor="middle" fill="#E2E8F0" font-family="Consolas, monospace" font-size="10" font-weight="700">FLUTTER</text>
  <rect x="260" y="200" width="96" height="28" rx="6" fill="none" stroke="#06B6D4" stroke-opacity="0.7"/>
  <text x="308" y="219" text-anchor="middle" fill="#E2E8F0" font-family="Consolas, monospace" font-size="10" font-weight="700">ASP.NET</text>
  <rect x="366" y="200" width="64" height="28" rx="6" fill="none" stroke="#06B6D4" stroke-opacity="0.5"/>
  <text x="398" y="219" text-anchor="middle" fill="#E2E8F0" font-family="Consolas, monospace" font-size="10" font-weight="700">ODOO</text>
  <rect x="440" y="200" width="48" height="28" rx="6" fill="none" stroke="#8B5CF6" stroke-opacity="0.5"/>
  <text x="464" y="219" text-anchor="middle" fill="#E2E8F0" font-family="Consolas, monospace" font-size="10" font-weight="700">AI</text>

  <text x="64" y="252" fill="#64748B" font-family="Consolas, monospace" font-size="11">Sana'a, Yemen  |  Information Systems 2025  |  12+ Projects</text>

  <!-- Terminal -->
  <rect x="748" y="36" width="412" height="228" rx="16" fill="#050A14" stroke="#334155" stroke-width="1.5"/>
  <rect x="748" y="36" width="412" height="32" rx="16" fill="#111827"/>
  <rect x="748" y="52" width="412" height="16" fill="#111827"/>
  <circle cx="772" cy="52" r="5" fill="#EF4444"/>
  <circle cx="792" cy="52" r="5" fill="#F59E0B"/>
  <circle cx="812" cy="52" r="5" fill="#10B981"/>
  <text x="954" y="56" text-anchor="middle" fill="#64748B" font-family="Consolas, monospace" font-size="10">terminal</text>
  <text x="772" y="96" fill="#06B6D4" font-family="Consolas, monospace" font-size="12">$ whoami</text>
  <text x="772" y="118" fill="#E2E8F0" font-family="Consolas, monospace" font-size="12">Full Stack Developer</text>
  <text x="772" y="148" fill="#06B6D4" font-family="Consolas, monospace" font-size="12">$ skills --list</text>
  <text x="772" y="170" fill="#94A3B8" font-family="Consolas, monospace" font-size="11">ERP  Web  Mobile  AI</text>
  <text x="772" y="200" fill="#06B6D4" font-family="Consolas, monospace" font-size="12">$ status</text>
  <text x="772" y="222" fill="#10B981" font-family="Consolas, monospace" font-size="12">Open to work</text>
  <rect x="820" y="209" width="7" height="13" fill="#6366F1">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>

<svg width="1200" height="380" viewBox="0 0 1200 380" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Soliman Alsabahi</title>
  <desc id="desc">Premium developer profile banner</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="380" gradientUnits="userSpaceOnUse">
      <stop stop-color="#070B14"/>
      <stop offset="0.45" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#0A0F1C"/>
    </linearGradient>
    <radialGradient id="orb1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(180 80) rotate(45) scale(220)">
      <stop stop-color="#6366F1" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1020 300) rotate(-30) scale(260)">
      <stop stop-color="#06B6D4" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#6366F1"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="lineGlow" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6366F1" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#06B6D4" stop-opacity="0"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="12" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#FFFFFF" fill-opacity="0.06"/>
    </pattern>
    <clipPath id="clip"><rect width="1200" height="380"/></clipPath>
  </defs>

  <rect width="1200" height="380" fill="url(#bg)"/>
  <rect width="1200" height="380" fill="url(#dots)"/>
  <rect width="1200" height="380" fill="url(#orb1)"/>
  <rect width="1200" height="380" fill="url(#orb2)"/>

  <g clip-path="url(#clip)">
    <path d="M940 -40H1010L790 420H720L940 -40Z" fill="#6366F1" fill-opacity="0.22"/>
    <path d="M1030 -40H1065L845 420H810L1030 -40Z" fill="#06B6D4" fill-opacity="0.18"/>
    <path d="M0 318H380" stroke="url(#lineGlow)" stroke-width="4" filter="url(#softGlow)"/>
  </g>

  <!-- Main card -->
  <g transform="translate(48 44)">
    <rect width="720" height="292" rx="20" fill="#0B1120" fill-opacity="0.82" stroke="url(#accent)" stroke-width="1.5"/>
    <rect width="720" height="6" rx="3" fill="url(#accent)"/>

    <text x="36" y="58" fill="#06B6D4" font-family="Consolas, JetBrains Mono, monospace" font-size="13" font-weight="600">// Full Stack Developer</text>
    <text x="36" y="108" fill="#F8FAFC" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="46" font-weight="800" letter-spacing="-1">Soliman Alsabahi</text>
    <text x="684" y="108" text-anchor="end" fill="#94A3B8" font-family="Segoe UI, Tahoma, Arial, sans-serif" font-size="22" font-weight="600" direction="rtl">سليمان حمود الصباحي</text>

    <rect x="36" y="128" width="648" height="1" fill="#334155"/>

    <text x="36" y="162" fill="#CBD5E1" font-family="Consolas, JetBrains Mono, monospace" font-size="14">const stack = ["Angular", "Flutter", "ASP.NET", "Odoo", "AI"];</text>
    <text x="36" y="188" fill="#64748B" font-family="Consolas, JetBrains Mono, monospace" font-size="14">return buildFromIdeaToProduction(stack);</text>

    <g transform="translate(36 212)">
      <rect width="100" height="32" rx="8" fill="#6366F1"/>
      <text x="50" y="21" text-anchor="middle" fill="#FFF" font-family="Consolas, monospace" font-size="11" font-weight="700">ANGULAR</text>
      <rect x="112" width="96" height="32" rx="8" fill="#1E293B" stroke="#6366F1" stroke-opacity="0.6"/>
      <text x="160" y="21" text-anchor="middle" fill="#E2E8F0" font-family="Consolas, monospace" font-size="11" font-weight="700">FLUTTER</text>
      <rect x="220" width="108" height="32" rx="8" fill="#1E293B" stroke="#06B6D4" stroke-opacity="0.6"/>
      <text x="274" y="21" text-anchor="middle" fill="#E2E8F0" font-family="Consolas, monospace" font-size="11" font-weight="700">ASP.NET</text>
      <rect x="340" width="72" height="32" rx="8" fill="#1E293B" stroke="#06B6D4" stroke-opacity="0.5"/>
      <text x="376" y="21" text-anchor="middle" fill="#E2E8F0" font-family="Consolas, monospace" font-size="11" font-weight="700">ODOO</text>
      <rect x="424" width="56" height="32" rx="8" fill="#1E293B" stroke="#8B5CF6" stroke-opacity="0.5"/>
      <text x="452" y="21" text-anchor="middle" fill="#E2E8F0" font-family="Consolas, monospace" font-size="11" font-weight="700">AI</text>
    </g>

    <text x="36" y="278" fill="#64748B" font-family="Consolas, monospace" font-size="12">📍 Sana'a, Yemen  ·  🎓 Information Systems 2025  ·  🚀 12+ Projects</text>
  </g>

  <!-- Terminal panel -->
  <g transform="translate(800 56)">
    <rect width="352" height="268" rx="16" fill="#050A14" stroke="#334155" stroke-width="1.5"/>
    <rect width="352" height="36" rx="16" fill="#111827"/>
    <rect y="20" width="352" height="16" fill="#111827"/>
    <circle cx="24" cy="18" r="5" fill="#EF4444"/>
    <circle cx="44" cy="18" r="5" fill="#F59E0B"/>
    <circle cx="64" cy="18" r="5" fill="#10B981"/>
    <text x="176" y="22" text-anchor="middle" fill="#64748B" font-family="Consolas, monospace" font-size="11">terminal — soliman@dev</text>

    <text x="20" y="64" fill="#06B6D4" font-family="Consolas, monospace" font-size="12">$ whoami</text>
    <text x="20" y="86" fill="#E2E8F0" font-family="Consolas, monospace" font-size="12">Full Stack Developer</text>
    <text x="20" y="116" fill="#06B6D4" font-family="Consolas, monospace" font-size="12">$ skills --list</text>
    <text x="20" y="138" fill="#94A3B8" font-family="Consolas, monospace" font-size="11">ERP · Web · Mobile · AI</text>
    <text x="20" y="168" fill="#06B6D4" font-family="Consolas, monospace" font-size="12">$ status</text>
    <text x="20" y="190" fill="#10B981" font-family="Consolas, monospace" font-size="12">● Open to work</text>
    <text x="20" y="220" fill="#6366F1" font-family="Consolas, monospace" font-size="12">$ _</text>
    <rect x="68" y="209" width="8" height="14" fill="#6366F1" opacity="0.8">
      <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
